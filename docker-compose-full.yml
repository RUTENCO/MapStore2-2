name: sat_mapstore_system

services:
  lluvia-processor:
    build:
      context: "./modelo predictivo/lluvia_processor"
      dockerfile: Dockerfile
    container_name: sat_lluvia_processor
    environment:
      IDEAM_API_TOKEN: ${IDEAM_API_TOKEN}
      DAYS_BACK: ${DAYS_BACK:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
    volumes:
      - "./modelo predictivo/data/input:/app/data/input:ro"
      - "./modelo predictivo/data/output/lluvia:/app/data/output/lluvia:rw"
      - "./modelo predictivo/logs:/app/logs:rw"
    networks:
      - sat_network
    restart: "no"
    profiles:
      - lluvia
      - full-pipeline

  modelo-sat:
    build:
      context: "./modelo predictivo/modelo_sat"
      dockerfile: Dockerfile
    container_name: sat_modelo_deslizamientos
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      MODEL_URL: ${MODEL_URL}
    volumes:
      - "./modelo predictivo/data/input:/app/data/input:ro"
      - "./modelo predictivo/data/output/lluvia:/app/data/output/lluvia:ro"
      - "./modelo predictivo/data/output/modelo:/app/data/output/modelo:rw"
      - "./modelo predictivo/logs:/app/logs:rw"
    networks:
      - sat_network
    depends_on:
      - lluvia-processor
    restart: "no"
    profiles:
      - modelo
      - full-pipeline

  geotiff-exporter:
    build:
      context: "./modelo predictivo/geotiff_exporter"
      dockerfile: Dockerfile
    container_name: sat_geotiff_exporter
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      INTERPOLATION_METHOD: ${INTERPOLATION_METHOD:-idw}
      PIXEL_SIZE: ${PIXEL_SIZE:-2000}
      IDW_POWER: ${IDW_POWER:-3}
    volumes:
      - "./modelo predictivo/data/input:/app/data/input:ro"
      - "./modelo predictivo/data/output/modelo:/app/data/output/modelo:ro"
      - "./modelo predictivo/data/output/geotiff:/app/data/output/geotiff:rw"
      - "./modelo predictivo/logs:/app/logs:rw"
      - geoserver_uploads:/mnt/uploads:rw
    networks:
      - sat_network
      - mapstore-network
    depends_on:
      - modelo-sat
      - geoserver
    restart: "no"
    profiles:
      - geotiff
      - full-pipeline

  sat-orchestrator:
    build:
      context: "./modelo predictivo/sat_orchestrator"
      dockerfile: Dockerfile
    image: sat_system-sat-orchestrator:latest
    container_name: sat_orchestrator
    environment:
      TZ: America/Bogota
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
      CRON_SCHEDULE: ${CRON_SCHEDULE:-"00 01 * * *"}
      RUN_ON_START: ${RUN_ON_START:-false}
    volumes:
      - "./modelo predictivo/data:/app/data:rw"
      - "./modelo predictivo/logs:/app/logs:rw"
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sat_network
      - mapstore-network
    restart: unless-stopped
    profiles:
      - orchestrator

  postgres:
    build:
      context: "./docker/postgres/"
    image: geosolutions-mapstore/postgis
    container_name: postgres
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 120
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS}
      POSTGRES_DB: ${POSTGRES_DB}
      GEOSTORE_DB_USER: ${GEOSTORE_DB_USER}
      GEOSTORE_DB_PASS: ${GEOSTORE_DB_PASS}
      GEOSTORE_DB_SCHEMA: ${GEOSTORE_DB_SCHEMA}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pg_data:/var/lib/postgresql/data:rw
    networks:
      - mapstore-network
    profiles:
      - mapstore

  geoserver:
    build:
      context: .
      dockerfile: docker/geoserver.Dockerfile
    container_name: geoserver
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
      PUBLIC_HOST: ${PUBLIC_HOST}
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - geoserver_uploads:/mnt/uploads
    depends_on:
      - postgres
    networks:
      - mapstore-network
    profiles:
      - mapstore

  mapstore:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OVR: geostore-datasource-ovr-postgres.properties
        MAPSTORE_WEBAPP_SRC: "./product/target/mapstore.war"
    container_name: mapstore
    command:
      - sh
      - -lc
      - |
        sed -i "s|GEOSTORE_USER_PLACEHOLDER|$${GEOSTORE_DB_USER}|" /usr/local/tomcat/conf/geostore-datasource-ovr-postgres.properties
        sed -i "s|GEOSTORE_PASS_PLACEHOLDER|$${GEOSTORE_DB_PASS}|" /usr/local/tomcat/conf/geostore-datasource-ovr-postgres.properties
        envsubst '$$PUBLIC_HOST' \
          < /templates/proxy.properties.template \
          > /usr/local/tomcat/datadir/proxy.properties
        exec catalina.sh run
    environment:
      GEOSTORE_DB_USER: ${GEOSTORE_DB_USER}
      GEOSTORE_DB_PASS: ${GEOSTORE_DB_PASS}
      PUBLIC_HOST: ${PUBLIC_HOST}
      PUBLIC_PROTOCOL: ${PUBLIC_PROTOCOL}
      JAVA_OPTS: >-
        -DPRINT_BASE_URL=${PUBLIC_PROTOCOL}://${PUBLIC_HOST}/mapstore/pdf
        -Ddatadir.location=/usr/local/tomcat/datadir
        -Dgeostore-ovr=file:///usr/local/tomcat/conf/geostore-datasource-ovr-postgres.properties
    depends_on:
      postgres:
        condition: service_healthy
      geoserver:
        condition: service_started
    volumes:
      - mapstore_data:/usr/local/tomcat/datadir
      - ./docker/proxy.properties.template:/templates/proxy.properties.template:ro
    networks:
      - mapstore-network
    profiles:
      - mapstore

  sensors-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sensors-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      STATS_API_BASE_URL: ${STATS_API_BASE_URL}
      STATS_API_TIMEOUT_MS: "15000"
    networks:
      - mapstore-network
    profiles:
      - mapstore

  modelo-pred-menm:
    build:
      context: "./modelo pred menm/modelo"
      dockerfile: Dockerfile
    container_name: modelo_pred_menm
    environment:
      TZ: America/Bogota
      MODEL_DATA_ROOT: /data/datalake
      OUTPUT_RASTER_DIR: /mnt/uploads
      CRON_SCHEDULE: "0 3 15 * *"
      RUN_ON_START: "false"
      PYTHONUNBUFFERED: "1"
    volumes:
      - "./modelo pred menm/static/datalake:/data/datalake:rw"
      - geoserver_uploads:/mnt/uploads:rw
    restart: unless-stopped
    networks:
      - mapstore-network
    depends_on:
      - geoserver
    profiles:
      - modelo-pred-menm
      - mapstore

  proxy:
    image: nginx:latest
    container_name: proxy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      PUBLIC_PROTOCOL: ${PUBLIC_PROTOCOL}
    volumes:
      - ./docker/mapstore.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mapstore
      - sensors-api
    networks:
      - mapstore-network
    profiles:
      - mapstore

networks:
  sat_network:
    driver: bridge
  mapstore-network:
    driver: bridge

volumes:
  sat_data:
    driver: local
  sat_logs:
    driver: local
  pg_data:
  geoserver_data:
  geoserver_uploads:
  mapstore_data:
